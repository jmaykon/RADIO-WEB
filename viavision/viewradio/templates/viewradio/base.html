{% load static %}
<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    {% include "viewradio/includes/head.html" %}
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .swiper-button-next, .swiper-button-prev { color: #22d3ee; }
        .swiper-pagination-bullet-active { background: #a855f7; }
        .video-container video { object-fit: cover; width: 100%; height: 100%; }

        /* Estilo para el Header al hacer scroll */
        .header-scrolled {
            background: rgba(3, 0, 20, 0.98) !important;
            border-bottom: 1px solid rgba(34, 211, 238, 0.3) !important;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>

<body class="font-sans min-h-screen text-white pb-40 bg-[#030014] overflow-x-hidden">

    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-[#1a164d] via-[#030014] to-[#030014]">
        </div>
    </div>

    {% include "viewradio/includes/header.html" %}

    <main id="main-content" class="transition-all duration-300">
        {% block content %}{% endblock %}
    </main>

    {% include "viewradio/includes/footer.html" %}

    <script>
        // 1. Lógica del Scroll
        window.addEventListener('scroll', function () {
            const glass = document.getElementById('header-glass');
            if (glass) {
                if (window.scrollY > 30) {
                    glass.classList.add('header-scrolled');
                } else {
                    glass.classList.remove('header-scrolled');
                }
            }
        });

        // 2. Inicialización de Lucide
        function initIcons() {
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        // Ejecutar al cargar y después de cada cambio de HTMX
        document.addEventListener('DOMContentLoaded', initIcons);
        document.body.addEventListener('htmx:afterSwap', initIcons);
    </script>

    {% include "viewradio/includes/scripts.html" %}
</body>
</html>
