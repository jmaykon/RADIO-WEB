{% load static %}

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<audio id="radioPlayer" preload="none"></audio>

<a href="https://wa.me/59171264858" target="_blank"
    class="fixed right-0 top-1/2 -translate-y-1/2 z-[60] flex items-center group transition-all duration-300"
    aria-label="Chat on WhatsApp">
    <span class="bg-[#25D366] text-white font-bold text-xs uppercase tracking-widest px-4 py-2 rounded-l-full opacity-0 -translate-x-4 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300 shadow-lg">
        Escríbenos
    </span>
    <div class="relative flex items-center justify-center w-14 h-14 md:w-16 md:h-16 bg-[#25D366] text-white rounded-l-full shadow-[0_10px_25px_rgba(37,211,102,0.4)] border-l border-t border-b border-white/20">
        <span class="absolute inset-0 rounded-l-full bg-[#25D366] animate-ping opacity-40 group-hover:opacity-0"></span>
        <svg class="w-7 h-7 md:w-9 md:h-9 relative z-10" fill="currentColor" viewBox="0 0 24 24">
            <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.246 2.248 3.484 5.232 3.484 8.412-.003 6.557-5.338 11.892-11.893 11.892-1.997-.001-3.951-.5-5.688-1.448l-6.309 1.656zm6.224-3.82l.454.27c1.44.855 3.106 1.304 4.808 1.305 5.176 0 9.387-4.211 9.39-9.39.002-2.51-.977-4.87-2.757-6.65s-4.139-2.759-6.649-2.759c-5.178 0-9.39 4.212-9.394 9.391 0 1.748.485 3.45 1.403 4.931l.307.496-1.011 3.693 3.784-.991zM16.518 13.52c-.3-.15-1.776-.877-2.051-.976s-.476-.15-.676.15c-.2.3-.775.976-.95 1.176s-.35.225-.65.075c-.3-.15-1.267-.467-2.413-1.489-.892-.796-1.493-1.778-1.668-2.078s-.019-.462.13-.611c.134-.134.3-.35.45-.525.15-.175.2-.3.3-.5s.05-.375-.025-.525c-.075-.15-.676-1.627-.926-2.227-.243-.585-.49-.506-.676-.515s-.375-.015-.575-.015-.525.075-.8.375c-.275.3-1.05 1.026-1.05 2.5s1.075 2.9 1.225 3.1c.15.2 2.115 3.23 5.123 4.527.715.309 1.274.494 1.708.632.719.228 1.373.196 1.891.118.577-.087 1.776-.726 2.026-1.426.25-.7.25-1.3.175-1.425s-.275-.225-.575-.375z" />
        </svg>
    </div>
</a>

<footer class="fixed bottom-8 left-0 w-full z-50 px-4">
    <div class="max-w-xl mx-auto">
        <div class="glass-effect rounded-full p-2 pr-2 flex items-center justify-between shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/20" style="background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px);">
            <div class="flex items-center gap-4 pl-4">
                <div class="relative">
                    <img src="{% static 'viewradio/assets/img/logo/retrocumbia.png' %}"
                        class="w-12 h-12 md:w-14 md:h-14 rounded-full border-2 border-cyan-500/50 object-cover"
                        onerror="this.src='https://via.placeholder.com/150'">
                    <div class="absolute -inset-1 bg-cyan-500/10 rounded-full blur-md"></div>
                </div>
                <div>
                    <h4 class="font-oswald font-bold text-white text-sm md:text-lg uppercase tracking-wide">
                        Via Vision 105.5
                    </h4>
                    <div class="flex items-center gap-1.5">
                        <span id="liveIndicator" class="h-2 w-2 rounded-full bg-gray-500 transition-all duration-300"></span>
                        <span id="statusText" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest transition-all duration-300">
                            Señal Digital
                        </span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <span id="actionLabel" class="hidden md:block text-[10px] text-gray-400 font-bold uppercase tracking-tighter">
                    Escuchar ahora
                </span>
                <button id="playBtn" 
                    class="flex items-center justify-center bg-gradient-to-tr from-cyan-600 to-cyan-400 text-white rounded-full w-12 h-12 md:w-14 md:h-14 transition-all transform hover:scale-110 active:scale-95 shadow-[0_0_20px_rgba(6,182,212,0.4)] border border-white/20">
                    <span id="btnIconContainer">
                        <i data-lucide="play" class="fill-current w-6 h-6 md:w-8 md:h-8 ml-1"></i>
                    </span>
                </button>
            </div>
        </div>
    </div>
</footer>

<script>
    window.onload = () => {
        if (window.lucide) { lucide.createIcons(); }

        const audio = document.getElementById('radioPlayer');
        const playBtn = document.getElementById('playBtn');
        const btnIconContainer = document.getElementById('btnIconContainer');
        const statusText = document.getElementById('statusText');
        const liveIndicator = document.getElementById('liveIndicator');
        const actionLabel = document.getElementById('actionLabel');
        
        let isPlaying = false;
        const streamUrl = "https://viavision.share.zrok.io/radio";

        // Función para cambiar icono dinámicamente
        const setIcon = (name, extraClass = "") => {
            btnIconContainer.innerHTML = `<i data-lucide="${name}" class="${extraClass} fill-current w-6 h-6 md:w-8 md:h-8"></i>`;
            lucide.createIcons();
        };

        playBtn.addEventListener('click', function() {
            if (!isPlaying) {
                // 1. ESTADO: CONECTANDO
                statusText.innerText = "Conectando...";
                statusText.style.color = "#fbbf24"; // Amarillo
                actionLabel.innerText = "Cargando...";
                setIcon("loader", "animate-spin");

                audio.src = streamUrl + "?t=" + new Date().getTime();
                
                audio.play().then(() => {
                    // 2. ESTADO: REPRODUCIENDO
                    isPlaying = true;
                    statusText.innerText = "En Vivo Ahora";
                    statusText.style.color = "#22d3ee"; 
                    liveIndicator.className = "h-2 w-2 rounded-full bg-cyan-400 animate-pulse";
                    actionLabel.innerText = "Reproduciendo";
                    setIcon("pause");
                }).catch(err => {
                    // 3. ESTADO: ERROR (Servidor caído o sin internet)
                    console.error("Error de streaming:", err);
                    isPlaying = false;
                    statusText.innerText = "No disponible";
                    statusText.style.color = "#ef4444"; // Rojo
                    liveIndicator.className = "h-2 w-2 rounded-full bg-red-500";
                    actionLabel.innerText = "Error de conexión";
                    setIcon("play", "ml-1");
                    audio.src = ""; 
                });

            } else {
                // 4. ESTADO: DETENER
                audio.pause();
                audio.src = ""; 
                isPlaying = false;
                
                statusText.innerText = "Señal Digital";
                statusText.style.color = "#9ca3af"; 
                liveIndicator.className = "h-2 w-2 rounded-full bg-gray-500";
                actionLabel.innerText = "Escuchar ahora";
                setIcon("play", "ml-1");
            }
        });
    };
</script>
