{% load static %}

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<footer class="fixed bottom-8 left-0 w-full z-50 px-4">
    <div class="max-w-xl mx-auto">
        <div class="glass-effect rounded-full p-2 pr-2 flex items-center justify-between shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/20">
            
            <div class="flex items-center gap-4 pl-4">
                <div class="relative">
                    <img src="{% static 'viewradio/assets/img/logo/retrocumbia.png' %}"
                        class="w-12 h-12 md:w-14 md:h-14 rounded-full border-2 border-cyan-500/50 object-cover">
                    <div class="absolute -inset-1 bg-cyan-500/10 rounded-full blur-md"></div>
                </div>
                <div>
                    <h4 class="font-oswald font-bold text-white text-sm md:text-lg uppercase tracking-wide">Via Vision 105.5</h4>
                    <div class="flex items-center gap-1.5">
                        <span class="h-2 w-2 rounded-full bg-cyan-400 animate-pulse"></span>
                        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Señal Digital</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <span class="hidden md:block text-[10px] text-gray-400 font-bold uppercase tracking-tighter">Escuchar ahora</span>
                <a href="https://viavision.ismyradio.com/player" 
                   target="_blank" 
                   class="flex items-center justify-center bg-gradient-to-tr from-cyan-600 to-cyan-400 text-white rounded-full w-12 h-12 md:w-14 md:h-14 transition-all transform hover:scale-110 active:scale-95 shadow-[0_0_20px_rgba(6,182,212,0.4)] border border-white/20">
                    <i data-lucide="play" class="fill-current w-6 h-6 md:w-8 md:h-8 ml-1"></i>
                </a>
            </div>

        </div>
    </div>
</footer>

<style>
    /* Estética Glassmorphism */
    .glass-effect {
        background: rgba(10, 10, 10, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }

    .font-oswald {
        font-family: 'Oswald', sans-serif;
    }

    /* Brillo extra al pasar el mouse por el botón */
    a:hover {
        box-shadow: 0 0 30px rgba(6, 182, 212, 0.6);
    }
</style>

<script>
    // Inicializar iconos de Lucide
    document.addEventListener('DOMContentLoaded', () => {
        if (window.lucide) {
            lucide.createIcons();
        }
    });
</script>
