{% load static %}
<header id="main-header" class="fixed top-0 w-full z-50 transition-all duration-300">
    <div id="header-glass" class="glass-effect border-b border-white/5 px-4">
        <div class="max-w-7xl mx-auto flex flex-col md:gap-0">

            <div class="flex items-center justify-between h-20 sm:h-24 md:h-28 px-2">
                <div class="flex-1 hidden sm:flex items-center">
                    <div
                        class="flex items-center gap-2 md:gap-3 px-3 md:px-5 py-1.5 md:py-2 rounded-full bg-white/5 border border-white/10 shadow-[0_0_15px_rgba(34,211,238,0.1)]">
                        <i data-lucide="radio" class="w-4 h-4 md:w-6 md:h-6 text-cyan-400 animate-pulse"></i>
                        <span
                            class="text-[10px] md:text-xs font-oswald tracking-[0.1em] md:tracking-[0.2em] text-cyan-400 uppercase font-bold whitespace-nowrap">
                            En Línea
                        </span>
                    </div>
                </div>

                <div class="flex-[2] sm:flex-1 flex justify-center items-center">
                    <a hx-get="{% url 'home' %}" hx-target="#main-content" hx-push-url="true"
                        class="relative group flex flex-col items-center cursor-pointer" id="main-logo-link"
                        hx-preserve>
                        <img src="{% static 'viewradio/assets/img/logo/VIAIVISION_FINAL.png' %}" alt="Logo"
                            class="h-12 sm:h-20 md:h-32 lg:h-44 w-auto object-contain transition-all duration-500 group-hover:scale-105">
                    </a>
                </div>

                <div class="flex-1 flex justify-end items-center">
                    <div
                        class="flex flex-col items-end gap-1 px-3 md:px-5 py-1.5 md:py-2 rounded-xl bg-white/5 border border-white/10 backdrop-blur-sm">
                        <div class="flex items-center gap-1.5 md:gap-2">
                            <span id="current-time"
                                class="text-sm sm:text-base md:text-lg font-oswald font-bold text-white tracking-wider">00:00:00</span>
                            <span class="w-1 h-1 md:w-1.5 md:h-1.5 rounded-full bg-cyan-400 animate-pulse"></span>
                        </div>
                    </div>
                </div>
            </div>
            <br>
            <nav class="w-full pb-4 md:pb-6">
                <ul class="flex items-center justify-center gap-4 sm:gap-6 lg:gap-8 overflow-x-auto no-scrollbar py-2">
                    <li><a hx-get="{% url 'programas' %}" hx-target="#main-content" hx-push-url="true"
                            class="nav-item text-[10px] sm:text-xs md:text-sm uppercase tracking-widest cursor-pointer">Programas</a>
                    </li>
                    <li class="h-1 w-1 rounded-full bg-white/20"></li>
                    <li><a hx-get="{% url 'inmobiliaria' %}" hx-target="#main-content" hx-push-url="true"
                            class="nav-item text-[10px] sm:text-xs md:text-sm uppercase tracking-widest hover:text-cyan-400 cursor-pointer">Inmobiliaria</a>
                    </li>
                    <li class="h-1 w-1 rounded-full bg-white/20"></li>
                    <li><a hx-get="{% url 'studio_live' %}" hx-target="#main-content" hx-push-url="true"
                            class="nav-item text-[10px] sm:text-xs md:text-sm uppercase tracking-widest hover:text-purple-400 cursor-pointer">Set
                        </a></li>
                    <li class="h-1 w-1 rounded-full bg-white/20"></li>
                    <li><a hx-get="{% url 'contacto' %}" hx-target="#main-content" hx-push-url="true"
                            class="nav-item text-[10px] sm:text-xs md:text-sm uppercase tracking-widest hover:text-pink-400 cursor-pointer">Contactos</a>
                    </li>
                </ul>
            </nav>

        </div>
    </div>
</header>

<script>
    // Función para el reloj (JS puro para que no dependa de Django tras la carga)
    function startClock() {
        const timeEl = document.getElementById('current-time');
        const dateEl = document.getElementById('current-date');

        const update = () => {
            const now = new Date();
            if (timeEl) timeEl.textContent = now.toLocaleTimeString('es-ES', { hour12: false });
            if (dateEl) {
                const options = { day: 'numeric', month: 'long', year: 'numeric' };
                dateEl.textContent = now.toLocaleDateString('es-ES', options).toUpperCase();
            }
        };
        setInterval(update, 1000);
        update();
    }

    // Reiniciar componentes de UI
    function initUI() {
        if (window.lucide) {
            lucide.createIcons();
        }

        // Lógica Menú Móvil
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        if (menuBtn && mobileMenu) {
            menuBtn.onclick = () => {
                const isHidden = mobileMenu.classList.toggle('hidden');
                menuIcon.setAttribute('data-lucide', isHidden ? 'menu' : 'x');
                lucide.createIcons();
            };
        }
    }

    // Ejecución inicial
    document.addEventListener('DOMContentLoaded', () => {
        startClock();
        initUI();
    });

    // Escuchar eventos de HTMX para refrescar iconos y menú
    document.body.addEventListener('htmx:afterSwap', () => {
        initUI();
    });
</script>
