{% load static %}
<header id="main-header" class="fixed top-0 w-full z-50 transition-all duration-300">
    <div id="header-glass" class="glass-effect border-b border-white/5 px-4 py-0">
        <div class="max-w-7xl mx-auto flex items-center justify-between h-20 md:h-auto">

            <div class="flex-1 hidden lg:flex items-center">
                <div class="flex items-center gap-3 px-5 py-2 rounded-full bg-white/5 border border-white/10 shadow-[0_0_15px_rgba(34,211,238,0.1)]">
                    <i data-lucide="radio" class="w-6 h-6 text-cyan-400 animate-pulse"></i>
                    <span class="text-xs font-oswald tracking-[0.2em] text-cyan-400 uppercase font-bold">En Línea</span>
                </div>
            </div>

            <div class="flex items-center justify-between w-full lg:w-auto md:flex-col md:justify-center">
                
                <button id="mobile-menu-btn" class="md:hidden text-white p-2 hover:bg-white/10 rounded-lg transition-colors z-[70] relative">
                    <i data-lucide="menu" id="menu-icon" class="w-8 h-8"></i>
                </button>

                <a hx-get="{% url 'home' %}" hx-target="#main-content" hx-push-url="true"
                    class="relative group flex flex-col items-center cursor-pointer mx-auto md:mx-0" id="main-logo-link" hx-preserve>
                    <div class="relative flex flex-col items-center">
                        <img src="{% static 'viewradio/assets/img/logo/VIAIVISION FINAL.png' %}"
                            alt="Logo"
                            class="h-20 sm:h-24 md:h-44 w-auto object-contain -mt-2 md:-mt-10 transition-all duration-500 group-hover:scale-105">

                        <div class="flex items-center w-full gap-2 -mt-3 md:-mt-8 mb-2">
                            <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent opacity-40"></div>
                            <span class="text-[8px] md:text-[10px] font-bold tracking-[0.4em] text-cyan-400 uppercase">105.5 FM</span>
                            <div class="h-[1px] flex-1 bg-gradient-to-r from-transparent via-cyan-500 to-transparent opacity-40"></div>
                        </div>
                    </div>
                </a>

                <div class="w-10 md:hidden"></div>

                <nav class="hidden md:block -mt-1 pb-3">
                    <ul class="flex items-center gap-6 lg:gap-8">
                        <li><a hx-get="{% url 'programas' %}" hx-target="#main-content" hx-push-url="true" class="nav-item">Programas</a></li>
                        <li class="h-1 w-1 rounded-full bg-white/20"></li>
                        <li><a hx-get="{% url 'inmobiliaria' %}" hx-target="#main-content" hx-push-url="true" class="nav-item hover:text-cyan-400">Inmobiliaria</a></li>
                        <li class="h-1 w-1 rounded-full bg-white/20"></li>
                        <li><a hx-get="{% url 'studio_live' %}" hx-target="#main-content" hx-push-url="true" class="nav-item hover:text-purple-400">Set Live</a></li>
                        <li class="h-1 w-1 rounded-full bg-white/20"></li>
                        <li><a hx-get="{% url 'contacto' %}" hx-target="#main-content" hx-push-url="true" class="nav-item hover:text-pink-400">Contactos</a></li>
                    </ul>
                </nav>
            </div>

            <div class="flex-1 hidden lg:flex justify-end items-center">
                <div class="flex flex-col items-end gap-1 px-5 py-2 rounded-xl bg-white/5 border border-white/10 backdrop-blur-sm">
                    <div class="flex items-center gap-2">
                        <span id="current-time" class="text-lg font-oswald font-bold text-white tracking-wider">00:00:00</span>
                        <span class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></span>
                    </div>
                    <div id="current-date" class="text-[10px] font-oswald uppercase tracking-[0.2em] text-gray-400 font-medium"></div>
                </div>
            </div>
        </div>
    </div>
</header>

<script>
    // Función para el reloj (JS puro para que no dependa de Django tras la carga)
    function startClock() {
        const timeEl = document.getElementById('current-time');
        const dateEl = document.getElementById('current-date');
        
        const update = () => {
            const now = new Date();
            if (timeEl) timeEl.textContent = now.toLocaleTimeString('es-ES', { hour12: false });
            if (dateEl) {
                const options = { day: 'numeric', month: 'long', year: 'numeric' };
                dateEl.textContent = now.toLocaleDateString('es-ES', options).toUpperCase();
            }
        };
        setInterval(update, 1000);
        update();
    }

    // Reiniciar componentes de UI
    function initUI() {
        if (window.lucide) {
            lucide.createIcons();
        }
        
        // Lógica Menú Móvil
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        if (menuBtn && mobileMenu) {
            menuBtn.onclick = () => {
                const isHidden = mobileMenu.classList.toggle('hidden');
                menuIcon.setAttribute('data-lucide', isHidden ? 'menu' : 'x');
                lucide.createIcons();
            };
        }
    }

    // Ejecución inicial
    document.addEventListener('DOMContentLoaded', () => {
        startClock();
        initUI();
    });

    // Escuchar eventos de HTMX para refrescar iconos y menú
    document.body.addEventListener('htmx:afterSwap', () => {
        initUI();
    });
</script>
