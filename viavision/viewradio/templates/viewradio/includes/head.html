<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViaVision 105.5 FM</title>

    <meta property="og:title" content="ViaVision 105.5 FM">
    <meta property="og:description" content="Sintoniza la mejor programación y música en vivo a través de RetroCumbia 105.5 FM.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://via-vision.onrender.com/{% static 'viewradio/assets/img/logo/LOGORETRO.png' %}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ViaVision 105.5 FM">
    <meta name="twitter:image" content="https://via-vision.onrender.com/{% static 'viewradio/assets/img/logo/LOGORETRO.png' %}">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'viewradio/css/styles.css' %}">

    <style>
        @keyframes subtle-zoom { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .animate-subtle-zoom { animation: subtle-zoom 20s infinite ease-in-out; }
        
        /* EFECTO INICIAL (Transparente arriba) */
        .glass-effect { 
            background: rgba(0, 0, 0, 0.2); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.4s ease; 
        }

        /* EFECTO AL BAJAR (Color sólido que no se pierde) */
        .header-scrolled {
            background: rgba(10, 10, 10, 0.95) !important; 
            border-bottom: 1px solid rgba(34, 211, 238, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-galaxy { 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .card-galaxy:hover { 
            border-color: rgba(168, 85, 247, 0.4); 
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.15); 
            transform: translateY(-5px); 
        }
    </style>
</head>
